name: email-triage-env
version: 1.0.0
description: |
  Real-world email triage environment. Agents classify customer support emails 
  by priority (low/medium/high/urgent) and category (bug/billing/account/etc).
tasks:
  - id: easy
    name: Easy Email Triage
    difficulty: easy
    description: "Classify 5 obvious emails by priority and category"
  - id: medium  
    name: Medium Email Triage
    difficulty: medium
    description: "Classify 8 emails requiring context understanding"
  - id: hard
    name: Hard Email Triage
    difficulty: hard
    description: "Classify 12 ambiguous customer emails"
action_space:
  type: discrete
  actions:
    - analyze: Analyze current email
    - classify: Assign priority + category to email
    - next: Move to next email
    - skip: Skip current email (penalty)
observation_space:
  current_email: Current email being triaged
  inbox: Full inbox (truncated view)
  stats: Processing statistics
reward_range: [-1.0, 3.0]
max_episode_steps:
  easy: 20
  medium: 40  
  hard: 80